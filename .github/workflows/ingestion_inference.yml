name: Stock Holmes Data Ingestion & Inference

on:
  schedule:
    # Runs every 5 minutes from Monday to Friday
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ingestion and Prediction
      env:
        TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      run: |
        # Fetch candles and store them to database
        python -m src.ingestion.fetcher --backfill 5000
        # Run inference (predict) & backfill past actual outcomes
        python -m src.models.predict

    - name: Commit and Push Updated SQLite Database
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/stock_holmes.db data/predictions_log.jsonl src/models/model.pkl src/models/metrics.json
        git commit -m "Auto-update database and prediction history [skip ci]" || echo "No changes to commit"
        git push origin main || echo "No changes to push"
