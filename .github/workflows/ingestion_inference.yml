name: Stock Holmes Data Ingestion & Inference

on:
  repository_dispatch:
    types: [run-prediction]
  workflow_dispatch: # Allows manual trigger
  schedule:
    # Hourly fallback schedule Monday to Friday in case external cron fails
    - cron: '0 * * * 1-5'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Multi-Symbol Ingestion and Prediction
      env:
        TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      run: |
        # Fetch candles for XAUUSD + cross-asset symbols (EUR/USD, USDJPY)
        python -m src.ingestion.fetcher --backfill 5000 --multi
        # Run inference (predict) & backfill past actual outcomes
        python -m src.models.predict

    - name: Commit and Push Updated Database and Models
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f data/stock_holmes.db
        git add data/predictions_log.jsonl
        git add src/models/model_up.pkl src/models/model_down.pkl
        git add src/models/metrics.json
        git commit -m "Auto-update database and prediction history [skip ci]" || echo "No changes to commit"
        git push origin main || echo "No changes to push"
